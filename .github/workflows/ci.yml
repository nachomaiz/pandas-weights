name: tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - src/**.py
      - tests/**.py
      - .github/workflows/ci.yml
  pull_request:
    branches: [main]
    paths:
      - src/**.py
      - tests/**.py
      - .github/workflows/ci.yml
  release:
    types: [published]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.14

      - name: Run Ruff lint
        run: uvx ruff check .

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: uv run --frozen --group test pytest
